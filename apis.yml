aid: compass-real-estate
name: Compass
description: >-
  Compass is a New York City headquartered, tech-enabled residential real
  estate brokerage founded in 2012 by Robert Reffkin and Ori Allon. The
  company operates the largest residential real estate brokerage in the
  United States by sales volume, supporting roughly 36,890 agents and
  $267 billion in gross transaction value across approximately 250,360
  transactions in fiscal year 2025, on $6.96 billion in revenue. Compass
  builds and operates a proprietary, end-to-end agent platform — an
  integrated cloud-based suite spanning CRM, marketing center, transaction
  management, listings, market analytics, the Compass One client
  dashboard, Compass Lens, AI-powered comparative market analysis,
  AI-generated video, virtual agent services, and a voice-activated AI
  assistant — custom-built for residential brokerage workflows. The
  company has invested over $100 million per year in technology and runs
  a 500+ person Product and Engineering organization, with engineering
  hubs that have included Seattle. Compass completed its merger with
  Anywhere Real Estate on January 9, 2026, combining two of the largest
  residential brokerage operators in the United States. The Compass
  platform is internal-facing: it is offered as the operating system for
  Compass agents and their clients, not as a developer product. There is
  no public REST API, OpenAPI specification, SDK, or third-party
  developer portal for the Compass real estate platform; the company's
  GitHub presence at github.com/urbancompass publishes a handful of
  internal-tooling open source projects (e.g. Snail, Mussel, hnvm,
  bazel-toolchain) rather than product APIs.
